name: check lint & test

on: 
  push:
    branches:
    - 'dev'


jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Install python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install poetry
        uses: snok/install-poetry@v1
      - run: poetry install
      - run: poetry install --only dev
      - run: make test
      - run: make lint
  coverage:
    needs: build
    name: Code Climate Coverage Action
    runs-on: ubuntu-latest
    steps:
      uses: paambaati/codeclimate-action@v3.2.0
      env:
        CC_TEST_REPORTER_ID: 79b33636d6ee8b9ced3d4aa5af9bcd88819ffbeb95aa001cb0888701216d1845
      with:
      coverageCommand: npm run coverage
      debug: true




