name: check lint & test

on: 
  push:
    branches:
    - 'dev'


jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Install python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install poetry
        uses: snok/install-poetry@v1
      - run: poetry install
      - run: poetry install --dev
      - run: make test
      - run: make lint



